name: Update README with latest projects

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate projects table
        id: generate
        run: |
          python .github/scripts/generate_projects.py

      - name: Commit and push if changed
        run: |
          git config user.name "k1590"
          git config user.email "kevinbiju1590@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto-update projects from GitHub repos"
          git push
